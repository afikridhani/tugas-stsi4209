<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003d82"/>
      <stop offset="100%" stop-color="#002855"/>
    </linearGradient>
    <linearGradient id="gradYellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffc107"/>
      <stop offset="100%" stop-color="#e0a800"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#gradBlue)" stroke="#fff" stroke-width="4"/>
  <!-- Yellow ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#gradYellow)" stroke-width="4"/>
  <!-- Letter UT -->
  <text x="100" y="118" text-anchor="middle" fill="#ffc107" font-family="Poppins, Arial, sans-serif" font-size="62" font-weight="700">UT</text>
  <!-- Subtitle -->
  <text x="100" y="155" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" letter-spacing="2">SITTA</text>
</svg>
